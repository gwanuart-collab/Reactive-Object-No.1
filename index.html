<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>" />
    <title>Reactive Object No.1</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #0f0f12;
      }

      #app {
        position: fixed;
        inset: 16px;
        overflow: hidden;
        border-radius: 14px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
      }

      #hud {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 10;
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px 18px;
        backdrop-filter: blur(8px);
        user-select: none;
      }
      #hud strong {
        color: rgba(255, 255, 255, 0.95);
      }

      #status {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: min(720px, calc(100vw - 24px));
        font: 12px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 12px;
        white-space: pre-wrap;
        backdrop-filter: blur(8px);
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="status" style="display: none;">Reactive Object No.1 로딩 중…</div>
    <div id="hud">
      <div><strong>Reactive Object No.1</strong></div>
      <div>마우스를 올리면 반응합니다.</div>
      <div>마우스 드래그 : 회전 / 마우스 휠 : 확대·축소</div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById('status');
        var hide = function () { if (statusEl) statusEl.style.display = 'none'; };
        var show = function (msg) { if (statusEl) statusEl.textContent = msg; };
        window.addEventListener('reactive-object-ready', hide, { once: true });
      })();
    </script>
  </body>
</html>
