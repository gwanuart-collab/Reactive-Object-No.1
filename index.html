<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>" />
    <title>Reactive Object No.1</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #0f0f12;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        user-select: none;
      }
      #hud strong {
        color: rgba(255, 255, 255, 0.95);
      }

      #status {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        max-width: min(720px, calc(100vw - 24px));
        font: 12px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: rgba(255, 255, 255, 0.9);
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 12px;
        white-space: pre-wrap;
        backdrop-filter: blur(8px);
        user-select: text;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="status">Reactive Object No.1 로딩 중…</div>
    <div id="hud">
      <div><strong>Reactive Object No.1</strong></div>
      <div><strong>조작</strong>: 마우스 드래그(회전) / 휠(줌) / 패닝</div>
      <div><strong>선택</strong>: Shift+클릭</div>
      <div><strong>부착</strong>: Enter / <strong>복구</strong>: Backspace / <strong>선택 해제</strong>: Delete 또는 X</div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById('status');
        var hide = function () { if (statusEl) statusEl.style.display = 'none'; };
        var show = function (msg) { if (statusEl) statusEl.textContent = msg; };
        window.addEventListener('reactive-object-ready', hide, { once: true });
        setTimeout(function () {
          if (statusEl && statusEl.style.display !== 'none') {
            show('로딩이 오래 걸리거나 실패했을 수 있어요.\n브라우저 콘솔(F12)을 확인하거나, 로컬에서 npm run dev 후 접속해 보세요.');
          }
        }, 15000);
      })();
    </script>
  </body>
</html>
